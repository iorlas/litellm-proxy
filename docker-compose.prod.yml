configs:
  litellm-config:
    content: |
      model_list:
        - model_name: llama3.2:3b
          litellm_params:
            model: openrouter/meta-llama/llama-3.3-70b-instruct
            api_key: os.environ/OPENROUTER_API_KEY

        - model_name: llama3.2:3b-local
          litellm_params:
            model: ollama/llama3.2:3b
            api_base: http://dtomilin-mwg-1.shrimp-boa.ts.net:11434

        - model_name: nomic-embed-text
          litellm_params:
            model: openrouter/nomic-ai/nomic-embed-text-v1.5
            api_key: os.environ/OPENROUTER_API_KEY

      router_settings:
        num_retries: 2
        fallbacks:
          - llama3.2:3b:
              - llama3.2:3b-local

services:
  litellm:
    image: docker.litellm.ai/berriai/litellm:main-v1.82.3
    hostname: llm
    command: ["--config", "/app/config.yaml", "--port", "4000"]
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
    configs:
      - source: litellm-config
        target: /app/config.yaml
    labels:
      - tailscale=true
      - traefik.enable=true
      - traefik.http.routers.litellm.rule=Host(`litellm.ts.${HOST_DOMAIN}`)
      - traefik.http.routers.litellm.entrypoints=web
      - traefik.http.services.litellm.loadbalancer.server.port=4000
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health/liveliness')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
    networks: [dokploy-network]
    restart: unless-stopped

networks:
  dokploy-network:
    external: true
