# Required GitHub secrets:
#   DOKPLOY_AUTH_TOKEN  — Dokploy Settings > Profile > API/CLI
#   DOKPLOY_COMPOSE_ID  — per-repo
#   DOKPLOY_URL         — https://shen.iorlas.net
#   OPENROUTER_API_KEY  — OpenRouter API key

name: Deploy LiteLLM Proxy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Install tools
        run: |
          pip install yamllint
          CONFTEST_URL="https://github.com/open-policy-agent/conftest"
          CONFTEST_VER="v0.56.0"
          wget -qO - "${CONFTEST_URL}/releases/download/${CONFTEST_VER}/conftest_0.56.0_Linux_x86_64.tar.gz" \
            | tar xz -C /usr/local/bin conftest

      - name: Lint
        run: make lint

      - name: Deploy to Dokploy
        if: github.event_name != 'pull_request'
        env:
          DOKPLOY_AUTH_TOKEN: ${{ secrets.DOKPLOY_AUTH_TOKEN }}
          DOKPLOY_URL: ${{ secrets.DOKPLOY_URL }}
          DOKPLOY_COMPOSE_ID: ${{ secrets.DOKPLOY_COMPOSE_ID }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          HOST_DOMAIN: shen.iorlas.net
        run: |
          mkdir -p ~/.config/dokploy
          echo "${DOKPLOY_AUTH_TOKEN}" > ~/.config/dokploy/token
          echo "${DOKPLOY_URL}" > ~/.config/dokploy/url
          pip install httpx websockets click
          python3 scripts/dokctl.py deploy "${DOKPLOY_COMPOSE_ID}" docker-compose.prod.yml
